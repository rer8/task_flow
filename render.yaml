databases:
  - name: taskflow-db
    plan: free
    databaseName: taskflow
    user: taskflow

services:
  - type: web
    plan: free
    name: taskflow
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn task_manager.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
